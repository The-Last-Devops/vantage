<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · last-monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          ink: '#0B0E14', panel: '#10151F', panel2: '#141A26', line: '#1E2632',
          teal: { DEFAULT: '#34E1C4', fg: '#06231F' },
        },
        fontFamily: { mono: ['ui-monospace','SF Mono','JetBrains Mono','Menlo','monospace'] },
      } },
    };
  </script>
</head>
<body class="min-h-screen bg-ink font-mono text-slate-200 antialiased">
  <div class="flex min-h-screen items-center justify-center px-6">
    <div class="w-full max-w-sm">
      <!-- brand -->
      <div class="mb-8 flex items-center justify-center gap-2.5">
        <span class="inline-block h-7 w-7 rounded-md bg-teal shadow-[0_0_20px_-4px_#34E1C4]"></span>
        <span class="text-xl font-semibold tracking-tight text-slate-100">last-monitor</span>
      </div>

      <form class="space-y-4 rounded-xl border border-line bg-panel p-7 shadow-2xl">
        <div>
          <h1 class="text-base font-semibold text-slate-100">Sign in</h1>
          <p class="mt-1 text-sm text-slate-500">Monitor your fleet & services.</p>
        </div>

        <label class="block text-sm">
          <span class="text-slate-400">Email</span>
          <input type="email" value="admin@example.com"
            class="mt-1.5 w-full rounded-lg border border-line bg-panel2 px-3 py-2.5 text-slate-100 outline-none transition focus:border-teal focus:ring-1 focus:ring-teal/40" />
        </label>

        <label class="block text-sm">
          <span class="text-slate-400">Password</span>
          <input type="password" value="••••••••"
            class="mt-1.5 w-full rounded-lg border border-line bg-panel2 px-3 py-2.5 text-slate-100 outline-none transition focus:border-teal focus:ring-1 focus:ring-teal/40" />
        </label>

        <a href="index.html"
          class="block w-full rounded-lg bg-teal px-4 py-2.5 text-center font-semibold text-teal-fg transition hover:opacity-90">
          Sign in
        </a>

        <p class="text-center text-xs text-slate-600">No public registration — accounts are provisioned by an admin.</p>
      </form>
    </div>
  </div>
</body>
</html>
