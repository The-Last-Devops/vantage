<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>System detail · last-monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#0B0E14', panel: '#10151F', panel2: '#141A26', line: '#1E2632', teal: { DEFAULT: '#34E1C4', fg: '#06231F' } },
      fontFamily: { mono: ['ui-monospace','SF Mono','JetBrains Mono','Menlo','monospace'] },
    } } };
  </script>
</head>
<body class="min-h-screen bg-ink font-mono text-slate-200 antialiased">
  <div id="page" data-title="System detail" data-active="systems" data-root="..">

    <!-- breadcrumb -->
    <nav id="breadcrumb" class="mb-4 flex flex-wrap items-center gap-1.5 text-sm text-slate-500"></nav>

    <!-- metadata header -->
    <div class="mb-5 rounded-xl border border-line bg-panel p-5">
      <div class="flex flex-wrap items-center gap-x-3 gap-y-2">
        <span class="flex items-center gap-2 text-sm"><span class="h-2.5 w-2.5 rounded-full bg-teal"></span><span class="font-semibold text-teal">Up</span></span>
        <span id="mdName" class="text-lg font-semibold text-slate-100">—</span>
        <span id="mdType" class="rounded bg-teal/10 px-2 py-0.5 text-xs text-teal"></span>
        <span id="mdNs" class="rounded bg-panel2 px-2 py-0.5 text-xs text-slate-400"></span>
      </div>
      <dl id="mdGrid" class="mt-4 grid grid-cols-2 gap-x-6 gap-y-3 text-sm sm:grid-cols-3 lg:grid-cols-6"></dl>
    </div>

    <!-- range selector (ẩn ở trang nhóm) -->
    <div id="rangeBar" class="mb-4 flex flex-wrap items-center gap-2">
      <div class="flex rounded-lg border border-line bg-panel2 p-0.5 text-sm">
        <button class="rounded-md px-3 py-1 text-slate-400 hover:text-slate-100">1h</button>
        <button class="rounded-md bg-teal/15 px-3 py-1 font-medium text-teal">6h</button>
        <button class="rounded-md px-3 py-1 text-slate-400 hover:text-slate-100">24h</button>
        <button class="rounded-md px-3 py-1 text-slate-400 hover:text-slate-100">7d</button>
        <button class="rounded-md px-3 py-1 text-slate-400 hover:text-slate-100">30d</button>
      </div>
    </div>

    <!-- charts (leaf) hoặc overview cards (group) -->
    <div id="charts" class="grid grid-cols-1 gap-4 lg:grid-cols-2"></div>

    <!-- sub-list: containers (docker) / nodes (k8s) -->
    <div id="subSection" class="mt-5 space-y-5"></div>

  </div>

  <!-- pre-shell: đặt tiêu đề topbar = tên system -->
  <script>
    (function () {
      const n = new URLSearchParams(location.search).get('name');
      if (n) document.getElementById('page').dataset.title = n;
    })();
  </script>
  <script src="../js/shell.js"></script>
  <script>
    // ===== params (type quyết định layout) =====
    const q = new URLSearchParams(location.search);
    const type = q.get('type') || 'node';
    const name = q.get('name') || 'db-primary';
    const ns = q.get('ns') || 'production';
    const parent = q.get('parent');
    const ptype = q.get('ptype');
    const TYPE_LABEL = { node: 'Node', host: 'Host', docker: 'Docker', k8s: 'Kubernetes', container: 'Container' };
    const enc = encodeURIComponent;
    const link = (params) => 'server.html?' + Object.entries(params).map(([k, v]) => `${k}=${enc(v)}`).join('&');

    // ===== helpers =====
    function gen(seed, base, amp, n = 40) {
      const a = []; let v = base;
      for (let i = 0; i < n; i++) { v += Math.sin(i * 0.5 + seed) * amp * 0.35 + (((i * 7 + seed) % 7) - 3) * amp * 0.06; v = Math.max(base * 0.25, Math.min(base + amp, v)); a.push(v); }
      return a;
    }
    function multiChart(series, unit) {
      const w = 520, h = 120, n = series[0].data.length, sx = w / (n - 1);
      const max = Math.max(...series.flatMap(s => s.data)) * 1.1 || 1;
      let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="h-28 w-full">`;
      series.forEach((s, si) => {
        const line = s.data.map((p, i) => `${(i*sx).toFixed(1)},${(h - (p/max)*h).toFixed(1)}`).join(' ');
        const id = `g${si}`;
        svg += `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity="0.18"/><stop offset="100%" stop-color="${s.color}" stop-opacity="0"/></linearGradient></defs>`;
        svg += `<polygon points="0,${h} ${line} ${w},${h}" fill="url(#${id})"/><polyline points="${line}" fill="none" stroke="${s.color}" stroke-width="1.5"/>`;
      });
      svg += `</svg>`;
      const legend = series.map(s => {
        const last = s.data[s.data.length - 1];
        const val = (unit === '%' || unit === '°C') ? Math.round(last) : last.toFixed(0);
        return `<span class="flex items-center gap-1.5"><span class="h-2 w-2 rounded-sm" style="background:${s.color}"></span><span class="text-slate-400">${s.name}</span><span class="tabular-nums text-slate-300">${val}${unit}</span></span>`;
      }).join('');
      return svg + `<div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs">${legend}</div>`;
    }
    function gauge(v) {
      const c = v >= 90 ? '#f87171' : v >= 70 ? '#fbbf24' : '#34E1C4';
      const tc = v >= 90 ? 'text-red-400' : v >= 70 ? 'text-amber-400' : 'text-slate-300';
      return `<div class="flex items-center gap-2"><div class="h-1.5 w-16 overflow-hidden rounded bg-line"><div class="h-full" style="width:${v}%;background:${c}"></div></div><span class="${tc} tabular-nums">${v}%</span></div>`;
    }
    function dot(s) { return `<span class="inline-block h-2 w-2 rounded-full ${s === 'warn' ? 'bg-amber-400' : s === 'offline' ? 'bg-red-400' : 'bg-teal'}"></span>`; }
    function statCard(label, val, pct) {
      const bar = pct != null ? `<div class="mt-2 h-1 overflow-hidden rounded bg-line"><div class="h-full ${pct >= 90 ? 'bg-red-400' : pct >= 70 ? 'bg-amber-400' : 'bg-teal'}" style="width:${pct}%"></div></div>` : '';
      return `<div class="rounded-xl border border-line bg-panel p-3.5"><div class="text-xs uppercase tracking-wider text-slate-500">${label}</div><div class="mt-1 text-xl font-semibold text-slate-100">${val}</div>${bar}</div>`;
    }

    // range → độ phân giải lưu trong DB (realtime 1s không lưu, chỉ live)
    const RANGES = [['1h', '1m'], ['6h', '1m'], ['24h', '5m'], ['7d', '15m'], ['30d', '1h']];
    let activeRange = '6h';
    function renderRangeBar() {
      const bar = document.getElementById('rangeBar');
      const btns = RANGES.map(([r]) => `<button onclick="pickRange('${r}')" class="rounded-md px-3 py-1 ${r === activeRange ? 'bg-teal/15 font-medium text-teal' : 'text-slate-400 hover:text-slate-100'}">${r}</button>`).join('');
      const res = RANGES.find(([r]) => r === activeRange)[1];
      bar.innerHTML = `
        <div class="flex rounded-lg border border-line bg-panel2 p-0.5 text-sm">${btns}</div>
        <span class="text-xs text-slate-500">Resolution <span class="rounded bg-panel2 px-1.5 py-0.5 text-slate-300">${res}</span></span>
        <span class="ml-auto flex items-center gap-1.5 text-xs text-teal"><span class="h-1.5 w-1.5 animate-pulse rounded-full bg-teal"></span>Live 1s</span>`;
    }
    function pickRange(r) { activeRange = r; renderRangeBar(); }
    const livePill = '<span class="flex items-center gap-1 text-[11px] text-teal"><span class="h-1.5 w-1.5 animate-pulse rounded-full bg-teal"></span>Live</span>';

    // ===== chart configs =====
    const tempAvail = true, gpuAvail = false;
    const hostCharts = [
      { title: 'CPU Usage', sub: 'overall % (per-core: future)', unit: '%', series: [{ name: 'total', color: '#34E1C4', data: gen(2, 50, 40) }] },
      { title: 'Memory', sub: 'RAM + swap', unit: '%', series: [{ name: 'RAM', color: '#34E1C4', data: gen(5, 60, 25) }, { name: 'Swap', color: '#8B7FD6', data: gen(9, 8, 12) }] },
      { title: 'Disk Usage', sub: '/ (root) — per-partition: future', unit: '%', series: [{ name: 'used', color: '#34E1C4', data: gen(3, 70, 6) }] },
      { title: 'Disk I/O', sub: 'read / write', unit: ' MB/s', series: [{ name: 'read', color: '#34E1C4', data: gen(7, 80, 120) }, { name: 'write', color: '#F4A261', data: gen(11, 40, 90) }] },
      { title: 'Network', sub: 'rx / tx', unit: ' Mb/s', series: [{ name: 'rx', color: '#34E1C4', data: gen(4, 300, 500) }, { name: 'tx', color: '#5BA8FF', data: gen(8, 180, 350) }] },
      { title: 'Temperature', sub: 'multi-sensor', unit: '°C', avail: tempAvail, series: [{ name: 'CPU', color: '#F4A261', data: gen(6, 55, 14) }, { name: 'NVMe', color: '#E76F51', data: gen(10, 44, 8) }, { name: 'ambient', color: '#88C9B0', data: gen(13, 30, 5) }] },
      { title: 'GPU', sub: 'usage % · VRAM · power', unit: '%', avail: gpuAvail, series: [{ name: 'usage', color: '#34E1C4', data: gen(1, 40, 50) }] },
    ];
    const containerCharts = [
      { title: 'CPU Usage', sub: 'container %', unit: '%', series: [{ name: 'cpu', color: '#34E1C4', data: gen(2, 25, 35) }] },
      { title: 'Memory', sub: 'container RSS', unit: '%', series: [{ name: 'mem', color: '#34E1C4', data: gen(5, 40, 18) }] },
      { title: 'Network', sub: 'rx / tx', unit: ' MB/s', series: [{ name: 'rx', color: '#34E1C4', data: gen(4, 2, 4) }, { name: 'tx', color: '#5BA8FF', data: gen(8, 1.4, 3) }] },
    ];

    // ===== mock children =====
    const containers = [
      { name: 'nginx', status: 'online', cpu: 8, mem: 12, net: '1.2 / 0.4' },
      { name: 'api', status: 'online', cpu: 22, mem: 40, net: '3.1 / 1.8' },
      { name: 'postgres', status: 'online', cpu: 18, mem: 55, net: '0.6 / 0.9' },
      { name: 'redis', status: 'online', cpu: 4, mem: 20, net: '0.2 / 0.1' },
    ];
    const k8sNodes = [
      { name: 'cp-1', status: 'online', cpu: 38, mem: 55, disk: 40 },
      { name: 'worker-1', status: 'online', cpu: 52, mem: 70, disk: 61 },
      { name: 'worker-2', status: 'online', cpu: 49, mem: 66, disk: 58 },
      { name: 'worker-3', status: 'online', cpu: 44, mem: 62, disk: 50 },
      { name: 'worker-4', status: 'warn', cpu: 81, mem: 88, disk: 72 },
    ];

    // ===== breadcrumb =====
    const sep = '<span class="text-slate-700">›</span>';
    let crumb = '<a href="../index.html" class="hover:text-teal">Systems</a>';
    if (parent && ptype) {
      crumb += `${sep}<span>${TYPE_LABEL[ptype]}</span>${sep}<a class="hover:text-teal" href="${link({ type: ptype, name: parent, ns })}">${parent}</a>${sep}<span class="text-slate-200">${name}</span>`;
    } else {
      crumb += `${sep}<span>${TYPE_LABEL[type] || 'Node'}</span>${sep}<span class="text-slate-200">${name}</span>`;
    }
    document.getElementById('breadcrumb').innerHTML = crumb;
    document.getElementById('mdName').textContent = name;
    document.getElementById('mdType').textContent = TYPE_LABEL[type] || 'Node';
    document.getElementById('mdNs').textContent = ns;

    // ===== layout per type =====
    const chartsEl = document.getElementById('charts');
    const sub = document.getElementById('subSection');
    const mdGrid = document.getElementById('mdGrid');
    const metaItem = (k, v) => `<div><dt class="text-xs text-slate-600">${k}</dt><dd class="text-slate-200">${v}</dd></div>`;

    function bigCharts(cfg) {
      chartsEl.className = 'grid grid-cols-1 gap-4 lg:grid-cols-2';
      chartsEl.innerHTML = cfg.map(c => {
        const header = `<div class="mb-2 flex items-start justify-between"><div><div class="text-sm font-medium text-slate-200">${c.title}</div><div class="text-xs text-slate-600">${c.sub}</div></div>${c.avail === false ? '' : livePill}</div>`;
        const body = c.avail === false
          ? `<div class="flex h-28 items-center justify-center rounded-lg border border-dashed border-line text-center text-sm text-slate-600">No ${c.title.toLowerCase()} data on this host</div>`
          : multiChart(c.series, c.unit);
        return `<div class="rounded-xl border border-line bg-panel p-4">${header}${body}</div>`;
      }).join('');
    }
    function overview(cards) {
      document.getElementById('rangeBar').classList.add('hidden');
      chartsEl.className = 'grid grid-cols-2 gap-3 sm:grid-cols-4';
      chartsEl.innerHTML = cards;
    }
    function subTable(title, count, headCols, rows, action = '') {
      return `<div class="overflow-hidden rounded-xl border border-line">
        <div class="flex items-center justify-between border-b border-line bg-panel px-4 py-2.5">
          <div class="flex items-center gap-2"><h2 class="text-sm font-semibold text-slate-200">${title}</h2><span class="rounded-full bg-panel2 px-2 py-0.5 text-xs text-slate-500">${count}</span></div>
          ${action}
        </div>
        <div class="overflow-x-auto"><table class="w-full min-w-[560px] text-sm">
          <thead class="border-b border-line bg-panel text-left text-xs uppercase tracking-wider text-slate-500"><tr>${headCols.map(h => `<th class="px-4 py-2.5 font-medium">${h}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }
    const nameCell = (href, label, status) => `<td class="px-4 py-3"><a href="${href}" class="flex items-center gap-2.5 hover:text-teal">${dot(status)}<span class="text-slate-100">${label}</span></a></td>`;

    if (type === 'k8s') {
      const online = k8sNodes.filter(n => n.status !== 'offline').length;
      const avg = (k) => Math.round(k8sNodes.reduce((s, n) => s + n[k], 0) / k8sNodes.length);
      mdGrid.innerHTML = metaItem('Nodes', k8sNodes.length) + metaItem('Ready', `${online} / ${k8sNodes.length}`) + metaItem('K8s version', 'v1.29.4') + metaItem('Namespace', ns) + metaItem('Agent', 'v0.7.1');
      overview(statCard('Nodes ready', `${online}<span class="text-base text-slate-600">/${k8sNodes.length}</span>`) + statCard('Avg CPU', avg('cpu') + '%', avg('cpu')) + statCard('Avg memory', avg('mem') + '%', avg('mem')) + statCard('Avg disk', avg('disk') + '%', avg('disk')));
      const rows = k8sNodes.map(c => `<tr class="lm-row border-b border-line last:border-0">
        ${nameCell(link({ type: 'node', name: c.name, ns, parent: name, ptype: 'k8s' }), c.name, c.status)}
        <td class="px-4 py-3 ${c.status === 'warn' ? 'text-amber-400' : 'text-teal'}">${c.status}</td>
        <td class="px-4 py-3">${gauge(c.cpu)}</td><td class="px-4 py-3">${gauge(c.mem)}</td><td class="px-4 py-3">${gauge(c.disk)}</td>
      </tr>`).join('');
      sub.innerHTML = subTable('Nodes', k8sNodes.length, ['Node', 'Status', 'CPU', 'Mem', 'Disk'], rows);

    } else if (type === 'docker') {
      mdGrid.innerHTML = metaItem('Uptime', '12 days') + metaItem('Kernel', '6.8.0-40') + metaItem('CPU', 'Xeon E-2388G') + metaItem('Cores', '8c / 16t') + metaItem('Containers', containers.length) + metaItem('Agent', 'v0.7.1');

      // Host metrics hiện tại (cơ bản) + nút xem chi tiết
      document.getElementById('rangeBar').classList.add('hidden');
      chartsEl.className = '';
      const miniGauge = (label, v) => `<div><div class="text-xs text-slate-500">${label}</div><div class="mt-1.5">${gauge(v)}</div></div>`;
      const miniText = (label, v) => `<div><div class="text-xs text-slate-500">${label}</div><div class="mt-1.5 tabular-nums text-slate-300">${v}</div></div>`;
      chartsEl.innerHTML = `
        <div class="rounded-xl border border-line bg-panel p-4">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-200">Host</h2>
            <a href="${link({ type: 'host', name, ns })}" class="flex items-center gap-1 rounded-lg border border-line bg-panel2 px-2.5 py-1 text-xs text-teal hover:border-teal/50">
              View details <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </a>
          </div>
          <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-5">
            ${miniGauge('CPU', 35)}${miniGauge('Memory', 61)}${miniGauge('Disk', 48)}
            ${miniText('Disk I/O', '↓80 / ↑40 MB/s')}${miniText('Network', '↓2.1 / ↑1.4 MB/s')}
          </div>
        </div>`;

      const rows = containers.map(c => `<tr class="lm-row border-b border-line last:border-0">
        ${nameCell(link({ type: 'container', name: c.name, ns, parent: name, ptype: 'docker' }), c.name, c.status)}
        <td class="px-4 py-3 text-teal">${c.status}</td>
        <td class="px-4 py-3">${gauge(c.cpu)}</td><td class="px-4 py-3">${gauge(c.mem)}</td>
        <td class="px-4 py-3 tabular-nums text-slate-400">${c.net} <span class="text-slate-600">MB/s</span></td>
      </tr>`).join('');
      sub.innerHTML = subTable('Containers', containers.length, ['Container', 'Status', 'CPU', 'Mem', 'Net ↓↑'], rows);

    } else if (type === 'container') {
      mdGrid.innerHTML = metaItem('Image', `${name}:latest`) + metaItem('State', 'running') + metaItem('Restarts', '0') + metaItem('Host', parent || '—') + metaItem('Namespace', ns);
      renderRangeBar();
      bigCharts(containerCharts);

    } else { // node / host (leaf) — full host charts
      mdGrid.innerHTML = metaItem('Uptime', '34 days') + metaItem('Hostname', name + '.prod') + metaItem('Kernel', '6.8.0-40') + metaItem('CPU', 'EPYC 7543') + metaItem('Cores', '32c / 64t') + metaItem('Agent', 'v0.7.1');
      renderRangeBar();
      bigCharts(hostCharts);
    }
  </script>
</body>
</html>
