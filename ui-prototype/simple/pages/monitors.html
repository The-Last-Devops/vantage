<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitors · last-monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#0B0E14', panel: '#10151F', panel2: '#141A26', line: '#1E2632', teal: { DEFAULT: '#34E1C4', fg: '#06231F' } },
      fontFamily: { mono: ['ui-monospace','SF Mono','JetBrains Mono','Menlo','monospace'] },
    } } };
  </script>
</head>
<body class="min-h-screen bg-ink font-mono text-slate-200 antialiased">
  <div id="page" data-title="Monitors" data-active="monitors">

    <!-- summary -->
    <section class="mb-5 grid grid-cols-2 gap-4 sm:grid-cols-4">
      <div class="rounded-xl border border-line bg-panel p-4"><div class="text-xs uppercase tracking-wider text-slate-500">Up</div><div class="mt-1.5 text-2xl font-semibold text-teal">7</div></div>
      <div class="rounded-xl border border-line bg-panel p-4"><div class="text-xs uppercase tracking-wider text-slate-500">Down</div><div class="mt-1.5 text-2xl font-semibold text-red-400">1</div></div>
      <div class="rounded-xl border border-line bg-panel p-4"><div class="text-xs uppercase tracking-wider text-slate-500">Avg latency</div><div class="mt-1.5 text-2xl font-semibold text-slate-100">142<span class="text-base text-slate-500"> ms</span></div></div>
      <div class="rounded-xl border border-line bg-panel p-4"><div class="text-xs uppercase tracking-wider text-slate-500">Uptime 24h</div><div class="mt-1.5 text-2xl font-semibold text-slate-100">99.8%</div></div>
    </section>

    <!-- toolbar -->
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
      <div class="relative">
        <svg class="absolute left-2.5 top-2.5 h-4 w-4 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Filter monitors…" class="w-56 rounded-lg border border-line bg-panel2 py-2 pl-8 pr-3 text-sm outline-none focus:border-teal/50" />
      </div>
      <button class="flex items-center gap-1.5 rounded-lg bg-teal px-3.5 py-2 text-sm font-semibold text-teal-fg hover:opacity-90">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add monitor
      </button>
    </div>

    <!-- table -->
    <div class="overflow-x-auto rounded-xl border border-line">
      <table class="w-full min-w-[760px] text-sm">
        <thead class="border-b border-line bg-panel text-left text-xs uppercase tracking-wider text-slate-500">
          <tr>
            <th class="px-4 py-2.5 font-medium">Monitor</th>
            <th class="px-4 py-2.5 font-medium">Status</th>
            <th class="px-4 py-2.5 font-medium">Heartbeat (1h)</th>
            <th class="px-4 py-2.5 font-medium">Latency</th>
            <th class="px-4 py-2.5 font-medium">Uptime 24h</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

  </div>

  <script src="../js/shell.js"></script>
  <script>
    const monitors = [
      { name: 'API gateway', kind: 'http', target: 'https://api.example.com/health', up: true, lat: 88, uptime: 100, beats: 30 },
      { name: 'Marketing site', kind: 'http', target: 'https://example.com', up: true, lat: 142, uptime: 99.9, beats: 30 },
      { name: 'Postgres', kind: 'tcp', target: '10.0.2.10:5432', up: true, lat: 4, uptime: 100, beats: 30 },
      { name: 'Redis', kind: 'tcp', target: '10.0.2.21:6379', up: true, lat: 2, uptime: 100, beats: 30 },
      { name: 'Payments webhook', kind: 'http', target: 'https://pay.example.com/ping', up: false, lat: null, uptime: 91.2, beats: 30, downAt: 4 },
      { name: 'CDN edge', kind: 'ping', target: 'edge.example.com', up: true, lat: 23, uptime: 99.7, beats: 30 },
    ];

    function heartbeat(m) {
      let bars = '';
      for (let i = 0; i < m.beats; i++) {
        const down = !m.up && i >= m.beats - (m.downAt || 0);
        bars += `<span class="inline-block h-5 w-1 rounded-sm ${down ? 'bg-red-400' : 'bg-teal'}"></span>`;
      }
      return `<div class="flex gap-0.5">${bars}</div>`;
    }

    document.getElementById('rows').innerHTML = monitors.map(m => `
      <tr class="border-b border-line last:border-0 hover:bg-panel2/40">
        <td class="px-4 py-3"><div class="text-slate-100">${m.name}</div><div class="text-xs text-slate-600">${m.kind} · ${m.target}</div></td>
        <td class="px-4 py-3">${m.up ? '<span class="text-teal">● up</span>' : '<span class="text-red-400">● down</span>'}</td>
        <td class="px-4 py-3">${heartbeat(m)}</td>
        <td class="px-4 py-3 tabular-nums text-slate-300">${m.lat != null ? m.lat + ' ms' : '—'}</td>
        <td class="px-4 py-3 tabular-nums ${m.uptime < 99 ? 'text-amber-400' : 'text-slate-300'}">${m.uptime}%</td>
      </tr>`).join('');
  </script>
</body>
</html>
