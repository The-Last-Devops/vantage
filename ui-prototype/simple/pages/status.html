<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status · Acme Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#0B0E14', panel: '#10151F', panel2: '#141A26', line: '#1E2632', teal: { DEFAULT: '#34E1C4', fg: '#06231F' } },
      fontFamily: { mono: ['ui-monospace','SF Mono','JetBrains Mono','Menlo','monospace'] },
    } } };
  </script>
</head>
<body class="min-h-screen bg-ink font-mono text-slate-200 antialiased">
  <div class="mx-auto max-w-3xl px-5 py-12 sm:py-16">

    <!-- brand -->
    <div class="mb-8 flex items-center gap-2.5">
      <span class="inline-block h-6 w-6 rounded-md bg-teal shadow-[0_0_18px_-4px_#34E1C4]"></span>
      <span class="text-base font-semibold tracking-tight text-slate-100">Acme Cloud</span>
    </div>

    <!-- overall banner -->
    <div class="mb-8 flex items-center gap-3 rounded-xl border border-teal/30 bg-teal/10 p-5">
      <svg class="h-6 w-6 text-teal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
      <div>
        <div class="text-lg font-semibold text-teal">All systems operational</div>
        <div class="text-xs text-slate-500">Updated 30s ago</div>
      </div>
    </div>

    <!-- services -->
    <div class="overflow-hidden rounded-xl border border-line">
      <div id="rows"></div>
    </div>

    <!-- 90-day history legend -->
    <div class="mt-3 flex items-center justify-between text-xs text-slate-600">
      <span>90 days ago</span>
      <span class="flex items-center gap-3">
        <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-sm bg-teal"></span>Operational</span>
        <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-sm bg-amber-400"></span>Degraded</span>
        <span class="flex items-center gap-1"><span class="h-2 w-2 rounded-sm bg-red-400"></span>Down</span>
      </span>
      <span>Today</span>
    </div>

    <p class="mt-10 text-center text-xs text-slate-600">Powered by last-monitor</p>
  </div>

  <script>
    const services = [
      { name: 'Website', uptime: 100 },
      { name: 'API', uptime: 99.98 },
      { name: 'Dashboard', uptime: 99.9 },
      { name: 'Payments', uptime: 97.4 },
      { name: 'CDN', uptime: 100 },
    ];

    function history(uptime) {
      // 90 day bars; derive a few non-operational days from uptime%
      const bad = Math.round((100 - uptime) * 0.9);
      let bars = '';
      for (let i = 0; i < 90; i++) {
        let cls = 'bg-teal';
        if (i >= 90 - bad && uptime < 99) cls = 'bg-red-400';
        else if (i >= 90 - bad * 2 && uptime < 100) cls = 'bg-amber-400';
        bars += `<span class="h-7 flex-1 rounded-[1px] ${cls}"></span>`;
      }
      return `<div class="flex gap-[2px]">${bars}</div>`;
    }

    document.getElementById('rows').innerHTML = services.map((s, i) => `
      <div class="${i ? 'border-t border-line ' : ''}bg-panel p-4">
        <div class="mb-2 flex items-center justify-between">
          <span class="text-slate-100">${s.name}</span>
          <span class="text-xs ${s.uptime < 99 ? 'text-amber-400' : 'text-teal'}">${s.uptime}% uptime</span>
        </div>
        ${history(s.uptime)}
      </div>`).join('');
  </script>
</body>
</html>
