name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - run: cargo test --workspace

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build
      - run: cargo build --workspace --release

  # Build each arch on its NATIVE runner (no QEMU = fast), push by digest, then the
  # manifest job stitches them into one multi-arch tag. The Docker Hub login makes
  # the buildx engine image (moby/buildkit, a Docker Hub image — NOT ours) pull
  # reliably instead of hitting anonymous rate-limits/blips. Add repo secrets
  # DOCKERHUB_USERNAME + DOCKERHUB_TOKEN to enable it (skipped if unset).
  # hub runs centrally (amd64 only); only the agent needs arm64.
  # Which component's code changed → only that image rebuilds. On `main` the tags
  # are moving (:main / :sha), so an unchanged component needs no action at all —
  # its existing tag already points at the last build.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      hub: ${{ steps.f.outputs.hub }}
      agent: ${{ steps.f.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            shared: &shared
              - 'crates/shared/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            hub:
              - *shared
              - 'crates/hub/**'
              - 'frontend/**'
              - 'deploy/Dockerfile.hub'
            agent:
              - *shared
              - 'crates/agent/**'
              - 'deploy/Dockerfile.agent'

  image:
    name: Image ${{ matrix.component }} (${{ matrix.arch }})
    if: github.event_name == 'push'
    needs: [changes, fmt, clippy, test]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [hub, agent]
        arch: [amd64, arm64]
        exclude:
          - component: hub
            arch: arm64
    env:
      IMAGE: ghcr.io/the-last-devops/last-monitor-${{ matrix.component }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      CHANGED: ${{ needs.changes.outputs[matrix.component] }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker Hub login (reliable buildkit image pull)
        if: env.DOCKERHUB_USERNAME != '' && env.CHANGED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        if: env.CHANGED == 'true'
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.component }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.arch }}
      - name: Export digest
        if: env.CHANGED == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"   # filename can't contain ':'
      - uses: actions/upload-artifact@v4
        if: env.CHANGED == 'true'
        with:
          name: digest-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Stitch the per-arch digests into one multi-arch tag (:main, :sha). imagetools is
  # a pure registry op — no builder/buildkit pull needed, so no Docker Hub dep here.
  manifest:
    name: Manifest (${{ matrix.component }})
    if: github.event_name == 'push'
    needs: [changes, image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [hub, agent]
    env:
      IMAGE: ghcr.io/the-last-devops/last-monitor-${{ matrix.component }}
      CHANGED: ${{ needs.changes.outputs[matrix.component] }}
    steps:
      - uses: actions/download-artifact@v4
        if: env.CHANGED == 'true'
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true
      - uses: docker/login-action@v3
        if: env.CHANGED == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        if: env.CHANGED == 'true'
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main
            type=sha
      - name: Create manifest list
        if: env.CHANGED == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for f in *; do printf '%s@sha256:%s ' "$IMAGE" "$f"; done)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      - name: Inspect
        if: env.CHANGED == 'true'
        run: docker buildx imagetools inspect "$IMAGE:main"
