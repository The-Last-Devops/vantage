name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Linux binaries (hub + agent) attached to the GitHub Release.
  binaries:
    name: Release binaries (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p hub -p agent
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/last-hub dist/
          cp target/release/last-agent dist/
          cp -r migrations dist/
          tar -C dist -czf last-monitor-${{ github.ref_name }}-linux-x86_64.tar.gz .
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: last-monitor-*.tar.gz
          generate_release_notes: true

  # Multi-arch container images pushed to GHCR.
  images:
    name: Image (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [hub, agent]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/last-monitor-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Helm charts published as OCI artifacts to GHCR (public alongside the images).
  #   hub:   helm install lm oci://ghcr.io/<owner>/charts/last-monitor --version <tag>
  #   agent: helm install lm-agent oci://ghcr.io/<owner>/charts/last-monitor-agent --version <tag>
  charts:
    name: Publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package & push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for c in chart agent; do
            helm package "deploy/$c" --version "$VERSION" --app-version "$VERSION"
          done
          helm push "last-monitor-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          helm push "last-monitor-agent-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
