name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Linux binaries (hub + agent) attached to the GitHub Release.
  binaries:
    name: Release binaries (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p hub -p agent
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/last-hub dist/
          cp target/release/last-agent dist/
          cp -r migrations dist/
          tar -C dist -czf last-monitor-${{ github.ref_name }}-linux-x86_64.tar.gz .
      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "Using CHANGELOG.md section for $VERSION"
          else
            echo "No CHANGELOG entry for $VERSION — falling back to auto-generated notes" >&2
          fi
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: last-monitor-*.tar.gz
          body_path: RELEASE_NOTES.md
          # also append GitHub's commit/PR list under the curated notes
          generate_release_notes: true

  # Per-arch image build on NATIVE runners (no QEMU = fast & reliable), pushed by
  # digest; the manifest job below stitches them into the semver + latest tags.
  # Mirrors ci.yml. hub runs centrally (amd64 only); only the agent needs arm64.
  image:
    name: Image ${{ matrix.component }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [hub, agent]
        arch: [amd64, arm64]
        exclude:
          - component: hub
            arch: arm64
    env:
      IMAGE: ghcr.io/the-last-devops/last-monitor-${{ matrix.component }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker Hub login (reliable buildkit image pull)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.component }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=rel-${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rel-${{ matrix.component }}-${{ matrix.arch }}
      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"   # filename can't contain ':'
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Stitch the per-arch digests into the semver + latest tags (pure registry op).
  manifest:
    name: Manifest (${{ matrix.component }})
    needs: [image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [hub, agent]
    env:
      IMAGE: ghcr.io/the-last-devops/last-monitor-${{ matrix.component }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for f in *; do printf '%s@sha256:%s ' "$IMAGE" "$f"; done)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      - name: Inspect
        run: docker buildx imagetools inspect "$IMAGE:latest"

  # Helm charts published as OCI artifacts to GHCR (public alongside the images).
  #   hub:   helm install lm oci://ghcr.io/<owner>/charts/last-monitor --version <tag>
  #   agent: helm install lm-agent oci://ghcr.io/<owner>/charts/last-monitor-agent --version <tag>
  charts:
    name: Publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package & push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for c in chart agent; do
            helm package "deploy/$c" --version "$VERSION" --app-version "$VERSION"
          done
          helm push "last-monitor-${VERSION}.tgz" "oci://ghcr.io/the-last-devops/charts"
          helm push "last-monitor-agent-${VERSION}.tgz" "oci://ghcr.io/the-last-devops/charts"
