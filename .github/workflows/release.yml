name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # Linux binaries (hub + agent) attached to the GitHub Release.
  binaries:
    name: Release binaries (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release -p vantage-hub -p vantage-agent
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/vantage-hub dist/
          cp target/release/vantage-agent dist/
          cp -r migrations dist/
          tar -C dist -czf vantage-${{ github.ref_name }}-linux-x86_64.tar.gz .
      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "Using CHANGELOG.md section for $VERSION"
          else
            echo "No CHANGELOG entry for $VERSION — falling back to auto-generated notes" >&2
          fi
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: vantage-*.tar.gz
          body_path: RELEASE_NOTES.md
          # also append GitHub's commit/PR list under the curated notes
          generate_release_notes: true

  # Which component changed since the PREVIOUS tag. An unchanged component isn't
  # rebuilt — the manifest job re-tags the previous release's image to this version
  # (a pure registry copy). A version-only bump touches Cargo.toml/lock, which the
  # `shared` filter treats as "both changed", so the embedded version stays correct.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      hub: ${{ steps.d.outputs.hub }}
      agent: ${{ steps.d.outputs.agent }}
      prev: ${{ steps.d.outputs.prev }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: d
        shell: bash
        run: |
          NEW="${GITHUB_REF_NAME}"
          PREV="$(git tag --sort=-creatordate | grep -vFx "$NEW" | head -1)"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV" ]; then
            echo "no previous tag — building everything"
            echo "hub=true" >> "$GITHUB_OUTPUT"; echo "agent=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CH="$(git diff --name-only "$PREV" "$NEW")"
          echo "changed files vs $PREV:"; echo "$CH"
          shared='^(crates/shared/|Cargo\.(toml|lock)$)'
          hub=false; agent=false
          echo "$CH" | grep -Eq "$shared|^crates/hub/|^frontend/|^deploy/Dockerfile\.hub$" && hub=true
          echo "$CH" | grep -Eq "$shared|^crates/agent/|^deploy/Dockerfile\.agent$" && agent=true
          echo "hub=$hub" >> "$GITHUB_OUTPUT"; echo "agent=$agent" >> "$GITHUB_OUTPUT"
          echo "→ hub=$hub agent=$agent"

  # Per-arch image build on NATIVE runners (no QEMU = fast & reliable), pushed by
  # digest; the manifest job below stitches them into the semver + latest tags.
  # Mirrors ci.yml. hub runs centrally (amd64 only); only the agent needs arm64.
  # Only a CHANGED component builds; unchanged ones are re-tagged in `manifest`.
  image:
    name: Image ${{ matrix.component }} (${{ matrix.arch }})
    needs: [changes]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [hub, agent]
        arch: [amd64, arm64]
        exclude:
          - component: hub
            arch: arm64
    env:
      IMAGE: ghcr.io/the-last-devops/vantage-${{ matrix.component }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      CHANGED: ${{ needs.changes.outputs[matrix.component] }}
    steps:
      - uses: actions/checkout@v4
        if: env.CHANGED == 'true'
      - name: Docker Hub login (reliable buildkit image pull)
        if: env.DOCKERHUB_USERNAME != '' && env.CHANGED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
        if: env.CHANGED == 'true'
      - uses: docker/login-action@v3
        if: env.CHANGED == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build
        if: env.CHANGED == 'true'
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.component }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Pinned release images are the "stable" channel (build metadata only).
          build-args: |
            VANTAGE_CHANNEL=stable
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=rel-${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=rel-${{ matrix.component }}-${{ matrix.arch }}
      - name: Export digest
        if: env.CHANGED == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"   # filename can't contain ':'
      - uses: actions/upload-artifact@v4
        if: env.CHANGED == 'true'
        with:
          name: digest-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  # Stitch the per-arch digests into the semver + latest tags (pure registry op).
  manifest:
    name: Manifest (${{ matrix.component }})
    needs: [changes, image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [hub, agent]
    env:
      IMAGE: ghcr.io/the-last-devops/vantage-${{ matrix.component }}
      CHANGED: ${{ needs.changes.outputs[matrix.component] }}
      PREV: ${{ needs.changes.outputs.prev }}
    steps:
      - uses: actions/download-artifact@v4
        if: env.CHANGED == 'true'
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.component }}-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Create manifest list (rebuilt component)
        if: env.CHANGED == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(for f in *; do printf '%s@sha256:%s ' "$IMAGE" "$f"; done)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      - name: Re-tag previous release (unchanged component)
        if: env.CHANGED != 'true'
        run: |
          echo "Component unchanged since ${PREV} — re-tagging its image to this release."
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "$IMAGE:${PREV#v}"
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
      - name: Inspect
        run: docker buildx imagetools inspect "$IMAGE:latest"

  # Helm charts published as OCI artifacts to GHCR (public alongside the images).
  #   hub:   helm install lm oci://ghcr.io/<owner>/charts/vantage --version <tag>
  #   agent: helm install vantage-agent oci://ghcr.io/<owner>/charts/vantage-agent --version <tag>
  charts:
    name: Publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Package & push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for c in chart agent; do
            helm package "deploy/$c" --version "$VERSION" --app-version "$VERSION"
          done
          helm push "vantage-${VERSION}.tgz" "oci://ghcr.io/the-last-devops/charts"
          helm push "vantage-agent-${VERSION}.tgz" "oci://ghcr.io/the-last-devops/charts"
