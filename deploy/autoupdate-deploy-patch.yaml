# Strategic-merge patch that wires the lm-hub Deployment for zero-downtime auto-update.
# Apply AFTER autoupdate-rbac.yaml:
#
#   kubectl -n last-monitor patch deployment lm-hub --patch-file deploy/autoupdate-deploy-patch.yaml
#
# ⚠ The container name below MUST match your Deployment's container (strategic-merge
#   matches list items by name). Check it with:
#     kubectl -n last-monitor get deploy lm-hub -o jsonpath='{.spec.template.spec.containers[*].name}'
#   then set `name:` accordingly (commonly "hub").
spec:
  # Surge a new, ready pod before terminating the old one → no 503 during updates.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      serviceAccountName: lm-hub
      containers:
        - name: hub                 # <-- set to your actual container name
          imagePullPolicy: Always   # re-pull the mutable :auto-update tag on rollout
          env:
            - name: HUB_DEPLOYMENT_NAME
              value: lm-hub
