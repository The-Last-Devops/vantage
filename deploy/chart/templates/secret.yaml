{{- /*
  api-key: use the value if provided; otherwise reuse the one already stored in
  this Secret (so `helm upgrade` keeps it stable), else generate a random one.
  The user never has to set it — agents enroll with the auto-generated key.
*/ -}}
{{- $name := include "lm.name" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $key := .Values.apiKey -}}
{{- if not $key -}}
  {{- if and $existing $existing.data (hasKey $existing.data "api-key") -}}
    {{- $key = index $existing.data "api-key" | b64dec -}}
  {{- else -}}
    {{- $key = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
type: Opaque
stringData:
  api-key: {{ $key | quote }}
  {{- if .Values.timescaledb.enabled }}
  db-password: {{ include "lm.dbPassword" . | quote }}
  {{- end }}
  {{- if .Values.admin.password }}
  admin-password: {{ .Values.admin.password | quote }}
  {{- end }}
