{{- /*
  Hub secrets: the auto-generated DB password (kept stable across upgrades via
  vantage.dbPassword) and, optionally, a pre-seeded admin password. Agent enrollment
  tokens are NOT here — they're created per-server in the UI (Add System).
*/ -}}
{{- if or .Values.timescaledb.enabled .Values.admin.password (include "vantage.appSecretEnabled" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vantage.name" . }}
type: Opaque
stringData:
  {{- if .Values.timescaledb.enabled }}
  db-password: {{ include "vantage.dbPassword" . | quote }}
  {{- end }}
  {{- if .Values.admin.password }}
  admin-password: {{ .Values.admin.password | quote }}
  {{- end }}
  {{- if include "vantage.appSecretEnabled" . }}
  app-secret: {{ include "vantage.appSecret" . | quote }}
  {{- end }}
{{- end }}
