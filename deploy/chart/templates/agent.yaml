{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-agent
  labels: { app: {{ .Release.Name }}-agent }
spec:
  selector:
    matchLabels: { app: {{ .Release.Name }}-agent }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-agent }
    spec:
      {{- include "lm.pullSecrets" . | nindent 6 }}
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: {{ .Values.image.agent }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: HUB_URL, value: "http://{{ include "lm.hub" . }}:8080" }
            - { name: AGENT_KIND, value: "k8s" }
            - { name: CLUSTER, value: {{ .Values.cluster | quote }} }
            - { name: INTERVAL, value: {{ .Values.agent.interval | quote }} }
            - { name: DISK_PATH, value: "/host" }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: AGENT_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "lm.name" . }}, key: api-key } }
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { memory: 128Mi }
          volumeMounts:
            - { name: host-root, mountPath: /host, readOnly: true }
      volumes:
        - name: host-root
          hostPath: { path: / }
{{- end }}
