apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lm.hub" . }}
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels: { app: {{ include "lm.hub" . }} }
  template:
    metadata:
      labels: { app: {{ include "lm.hub" . }} }
    spec:
      {{- include "lm.pullSecrets" . | nindent 6 }}
      containers:
        - name: hub
          image: {{ .Values.image.hub }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: BIND_ADDR, value: "0.0.0.0:8080" }
            - { name: CONFIG_DATABASE_URL, value: {{ include "lm.configUrl" . | quote }} }
            - { name: DATA_DATABASE_URL, value: {{ include "lm.dataUrl" . | quote }} }
            {{- if .Values.admin.password }}
            # Optional: pre-seed the admin. Omit to create it on first login instead.
            - { name: ADMIN_EMAIL, value: {{ .Values.admin.email | quote }} }
            - name: ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "lm.name" . }}, key: admin-password } }
            {{- end }}
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lm.hub" . }}
spec:
  type: {{ .Values.hub.service.type }}
  selector: { app: {{ include "lm.hub" . }} }
  ports: [{ port: 8080, targetPort: 8080 }]
{{- if .Values.hub.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lm.hub" . }}
  {{- with .Values.hub.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.hub.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.hub.ingress.tls }}
  tls:
    - hosts: [{{ .Values.hub.ingress.host | quote }}]
      secretName: {{ include "lm.hub" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.hub.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lm.hub" . }}
                port: { number: 8080 }
{{- end }}
