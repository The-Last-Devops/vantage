{{- $tag := ternary "auto-update" .Values.image.tag .Values.autoUpdate -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vantage.hub" . }}
spec:
  replicas: {{ .Values.hub.replicas }}
  # Zero-downtime rollouts: never drop below the desired count — surge a new pod, wait
  # for its readiness probe, then terminate the old one. This is what makes auto-update
  # (and any redeploy) gap-free even at replicas: 1.
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: {{ include "vantage.hub" . }} }
  template:
    metadata:
      labels: { app: {{ include "vantage.hub" . }} }
    spec:
      {{- include "vantage.pullSecrets" . | nindent 6 }}
      {{- if .Values.autoUpdate }}
      # SA grants the hub get/patch on its own Deployment so it can trigger the rollout.
      serviceAccountName: {{ include "vantage.hub" . }}
      {{- end }}
      # Give in-flight requests time to drain on SIGTERM (the hub shuts down gracefully).
      terminationGracePeriodSeconds: 30
      {{- with .Values.hub.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hub
          image: "{{ .Values.image.hub }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.hub.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.hub.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Brief pause before SIGTERM so kube-proxy removes this pod's endpoint first —
          # avoids the race where traffic still routes here while we're shutting down.
          lifecycle:
            preStop:
              exec: { command: ["sleep", "5"] }
          env:
            - { name: BIND_ADDR, value: "0.0.0.0:8080" }
            # 1 = roll the Deployment when a newer :auto-update image is published; 0 = manual.
            - { name: AUTO_UPDATE, value: {{ ternary "1" "0" .Values.autoUpdate | quote }} }
            # Lets the self-updater patch the right Deployment to trigger the rollout.
            - { name: HUB_DEPLOYMENT_NAME, value: {{ include "vantage.hub" . | quote }} }
            - { name: CONFIG_DATABASE_URL, value: {{ include "vantage.configUrl" . | quote }} }
            - { name: DATA_DATABASE_URL, value: {{ include "vantage.dataUrl" . | quote }} }
            {{- if .Values.admin.password }}
            # Optional: pre-seed the admin. Omit to create it on first login instead.
            - { name: ADMIN_EMAIL, value: {{ .Values.admin.email | quote }} }
            - name: ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "vantage.name" . }}, key: admin-password } }
            {{- end }}
            {{- if .Values.hub.ingress.host }}
            # Passkeys (WebAuthn) require RP id/origin to match the served scheme+domain.
            - { name: WEBAUTHN_RP_ID, value: {{ .Values.hub.ingress.host | quote }} }
            - { name: WEBAUTHN_ORIGIN, value: {{ printf "%s://%s" (include "vantage.scheme" .) .Values.hub.ingress.host | quote }} }
            - { name: PUBLIC_URL, value: {{ printf "%s://%s" (include "vantage.scheme" .) .Values.hub.ingress.host | quote }} }
            {{- end }}
            {{- if include "vantage.appSecretEnabled" . }}
            # Encrypts SSH-key master keys at rest (back it up — losing it = keys unrecoverable).
            - name: EXEC_APP_SECRET
              valueFrom: { secretKeyRef: { name: {{ include "vantage.name" . }}, key: app-secret } }
            {{- end }}
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          # Restart a wedged process (readiness only pulls it from the Service).
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vantage.hub" . }}
spec:
  type: {{ .Values.hub.service.type }}
  selector: { app: {{ include "vantage.hub" . }} }
  ports: [{ port: 8080, targetPort: 8080 }]
{{- if or .Values.hub.ingress.enabled .Values.hub.ingress.host }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vantage.hub" . }}
  {{- with .Values.hub.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.hub.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.hub.ingress.tls }}
  tls:
    - hosts: [{{ .Values.hub.ingress.host | quote }}]
      secretName: {{ include "vantage.hub" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.hub.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vantage.hub" . }}
                port: { number: 8080 }
{{- end }}
