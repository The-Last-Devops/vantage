image:
  hub: ghcr.io/the-last-devops/last-monitor-hub:main
  agent: ghcr.io/the-last-devops/last-monitor-agent:main
  pullPolicy: IfNotPresent
  # For private GHCR packages: kubectl create secret docker-registry ghcr ... then:
  pullSecrets: []        # e.g. [ghcr]

# First admin: leave password empty to create the admin on first login (the UI
# shows a one-time setup screen). Set both to pre-seed it instead.
admin:
  email: admin@local
  password: ""

# Agent enrollment key. Leave empty — the chart auto-generates one (kept stable
# across upgrades) so agents enroll with no manual step. Set to override.
apiKey: ""
cluster: my-cluster

# Two separate in-cluster Postgres instances (config + data), each its own PVC.
# Set enabled=false to use external databases (hub.configDatabaseUrl/dataDatabaseUrl).
timescaledb:
  enabled: true
  image: timescale/timescaledb:latest-pg16   # data DB (metrics/heartbeat hypertables)
  configImage: postgres:16-alpine            # config DB (plain Postgres)
  password: ""                        # leave empty — auto-generated, stable across upgrades
  storageClass: ""                    # "" = cluster default; applies to both DBs
  configStorage: 1Gi                  # config DB volume (small: users/config/rules)
  dataStorage: 5Gi                    # data DB volume (grows with metrics history)

hub:
  replicas: 1
  # Used only when timescaledb.enabled=false:
  configDatabaseUrl: ""
  dataDatabaseUrl: ""
  service:
    type: ClusterIP                   # NodePort/LoadBalancer to expose the UI
  # Point a domain at the hub. Enable it, set the host, and the chart creates an
  # Ingress (nginx by default) — change className for traefik/etc.
  ingress:
    enabled: false
    className: nginx
    host: ""                          # e.g. mon.example.com
    annotations: {}                   # e.g. cert-manager.io/cluster-issuer: letsencrypt
    tls: false                        # true → terminate HTTPS using <release>-tls secret

agent:
  enabled: true
  interval: 15
