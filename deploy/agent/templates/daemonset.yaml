{{- if not .Values.hubUrl }}{{ fail "set hubUrl to where the hub is reachable (e.g. --set hubUrl=https://monitor.senprints.net)" }}{{- end }}
{{- if not .Values.apiKey }}{{ fail "set apiKey to an API key created in the UI under Add System (--set apiKey=...)" }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
type: Opaque
stringData:
  api-key: {{ .Values.apiKey | quote }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels: { app: {{ .Release.Name }} }
spec:
  selector:
    matchLabels: { app: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app: {{ .Release.Name }} }
    spec:
      {{- with .Values.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          {{- $tag := ternary "auto-update" .Values.image.tag .Values.autoUpdate }}
          image: "{{ .Values.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.pullPolicy }}
          env:
            - { name: HUB_URL, value: {{ .Values.hubUrl | quote }} }
            - { name: AGENT_KIND, value: "k8s" }
            - { name: CLUSTER, value: {{ .Values.cluster | quote }} }
            # 1 = self-restart to follow the hub (auto-update); 0 = pinned/manual.
            - { name: AUTO_UPDATE, value: {{ ternary "1" "0" .Values.autoUpdate | quote }} }
            - { name: DISK_PATH, value: "/host" }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}, key: api-key } }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: host-root, mountPath: /host, readOnly: true }
      volumes:
        - name: host-root
          hostPath: { path: / }
