{{- if not .Values.hubUrl }}{{ fail "set hubUrl to where the hub is reachable (e.g. --set hubUrl=https://monitor.senprints.net)" }}{{- end }}
{{- if not .Values.apiKey }}{{ fail "set apiKey to an API key created in the UI under Add System (--set apiKey=...)" }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
type: Opaque
stringData:
  api-key: {{ .Values.apiKey | quote }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}
  labels: { app: {{ .Release.Name }} }
spec:
  selector:
    matchLabels: { app: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app: {{ .Release.Name }} }
    spec:
      {{- with .Values.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.pullPolicy }}
          env:
            - { name: HUB_URL, value: {{ .Values.hubUrl | quote }} }
            - { name: AGENT_KIND, value: "k8s" }
            - { name: CLUSTER, value: {{ .Values.cluster | quote }} }
            # 1 = open the reverse shell tunnel so the hub can SSH into this host via
            # 127.0.0.1:<sshd>. Off by default; the node must run sshd (hostNetwork=true
            # makes the agent's localhost:22 the node's sshd).
            - { name: ALLOW_SHELL, value: {{ ternary "1" "0" .Values.allowShell | quote }} }
            - { name: DISK_PATH, value: "/host" }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}, key: api-key } }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: host-root, mountPath: /host, readOnly: true }
      volumes:
        - name: host-root
          hostPath: { path: / }
